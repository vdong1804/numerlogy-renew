# =============================================================================
# Production app stack — deploys ALL Numerology projects on one host.
#
#   frontend  Next.js landing page   → published on 127.0.0.1:3003
#   api       FastAPI backend + CMS  → published on 127.0.0.1:8000
#   db        PostgreSQL 16 + pgvector
#
# TLS termination + reverse proxy + per-subdomain routing are handled by an
# nginx instance YOU configure directly on the host (not part of this stack).
# Point it at the 127.0.0.1 ports above, and serve uploads/static from the
# ./media and ./static bind-mounts.
#
# Usage (from this deploy/ dir on the server):
#   bash deploy.sh             # build + migrate + (re)start everything
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Next.js landing page (frontend). NEXT_PUBLIC_* vars are inlined at BUILD
  # time, so they are passed as build args (not runtime env).
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../Numerology-Landing-Page
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://api.nhansinhquan.vn}
        API_ENDPOINT: ${NEXT_PUBLIC_API_BASE:-https://api.nhansinhquan.vn}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://nhansinhquan.vn}
        NEXT_PUBLIC_GA4_ID: ${NEXT_PUBLIC_GA4_ID:-}
        NEXT_PUBLIC_FB_PIXEL_ID: ${NEXT_PUBLIC_FB_PIXEL_ID:-}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    ports:
      # Bound to localhost — the host nginx proxies to it.
      - "127.0.0.1:3003:3003"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FastAPI backend (serves api.* and cms.* subdomains). Runs Alembic
  # migrations on boot, then gunicorn with uvicorn workers.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../numerology-api
      dockerfile: Dockerfile
    env_file: ./.env.prod
    # NOTE: keep every continuation line at the SAME indent as `sh -c`. With a
    # folded scalar (>), lines indented deeper are kept literal — the embedded
    # newlines then terminate the shell command early, so gunicorn would boot
    # with NO args (default sync WSGI worker) and break this ASGI app.
    command: >
      sh -c "alembic upgrade head &&
      gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker
      -b 0.0.0.0:8000 --timeout 120 --access-logfile - --error-logfile -"
    ports:
      # Bound to localhost — the host nginx proxies to it.
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Host bind-mounts so the host nginx can serve /media and /static directly.
      # Target MUST match the app's MEDIA_ROOT/STATIC_ROOT (the image WORKDIR is
      # /app), otherwise uploads land outside the mount and nginx can't see them.
      - ./media:/app/media
      - ./static:/app/static
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 with pgvector (required by alembic migration 0010 — chatbot
  # RAG knowledge-base tables). Not exposed to the host.
  # ---------------------------------------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    env_file: ./.env.prod
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-numerology} -d ${POSTGRES_DB:-numerology}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  pg_data:
