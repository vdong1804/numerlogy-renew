worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format combined '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    client_max_body_size 20M;

    proxy_buffer_size          16k;
    proxy_buffers              4 64k;
    proxy_busy_buffers_size    128k;

    # Upstreams
    upstream frontend_upstream { server frontend:3003; }
    upstream api_upstream      { server api:8000; }

    # Shared TLS settings (single cert covers all SANs under nhansinhquan.vn)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # =========================================================================
    # HTTP (port 80) — ACME challenge pass-through + redirect to HTTPS
    # =========================================================================
    server {
        listen 80;
        server_name nhansinhquan.vn www.nhansinhquan.vn api.nhansinhquan.vn cms.nhansinhquan.vn;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # Frontend — nhansinhquan.vn (+ www redirect to apex)
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name www.nhansinhquan.vn;

        ssl_certificate     /etc/letsencrypt/live/nhansinhquan.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nhansinhquan.vn/privkey.pem;

        return 301 https://nhansinhquan.vn$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name nhansinhquan.vn;

        ssl_certificate     /etc/letsencrypt/live/nhansinhquan.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nhansinhquan.vn/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
    }

    # =========================================================================
    # Backend API — api.nhansinhquan.vn and cms.nhansinhquan.vn
    # Both subdomains share one FastAPI upstream; media/static served by nginx.
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name api.nhansinhquan.vn cms.nhansinhquan.vn;

        ssl_certificate     /etc/letsencrypt/live/nhansinhquan.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nhansinhquan.vn/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # User-uploaded media (served directly by nginx)
        location /media/ {
            alias /srv/media/;
            add_header X-Content-Type-Options nosniff;
            add_header Cache-Control "public, immutable";
            expires 30d;
        }

        # Collected static files
        location /static/ {
            alias /srv/static/;
            add_header Cache-Control "public, immutable";
            expires 30d;
        }

        # Chat SSE streaming endpoint — buffering OFF, long timeouts.
        # `^~`/regex priority beats the prefix `/` location below.
        location ~ ^/api/chat/conversations/\d+/messages/stream$ {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_buffering        off;
            proxy_cache            off;
            gzip                   off;
            chunked_transfer_encoding on;
            proxy_connect_timeout  10s;
            proxy_read_timeout     300s;
            proxy_send_timeout     300s;
        }

        # All other requests → FastAPI
        location / {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
