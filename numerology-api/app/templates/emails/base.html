<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>{% block subject %}Nhân Sinh Quan{% endblock %}</title>
<style>
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #f4f6fb; margin: 0; padding: 24px; color: #1f2937; }
  .container { max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 32px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .brand { font-weight: 700; font-size: 18px; color: #002060; margin-bottom: 16px; }
  h1 { font-size: 22px; margin: 0 0 12px; color: #002060; }
  p  { line-height: 1.55; margin: 0 0 12px; font-size: 15px; }
  .btn { display: inline-block; background: #002060; color: #ffffff !important; padding: 10px 18px; border-radius: 6px; text-decoration: none; font-weight: 600; margin: 12px 0; }
  .footer { text-align: center; color: #9aa3b2; font-size: 12px; margin-top: 24px; }
  .meta-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
  .meta-table td { padding: 6px 0; font-size: 14px; }
  .meta-table td:first-child { color: #6b7280; }
</style>
</head>
<body>
  <div class="container">
    <div class="brand">Nhân Sinh Quan</div>
    {% block content %}{% endblock %}
    <div class="footer">
      © Nhân Sinh Quan · <a href="https://nhansinhquan.vn">nhansinhquan.vn</a><br>
      Bạn nhận email này vì có tài khoản tại Nhân Sinh Quan.<br>
      <a href="{{ frontend_url or 'https://nhansinhquan.vn' }}/my-account/settings">Huỷ đăng ký nhận email</a>
    </div>
  </div>
</body>
</html>
