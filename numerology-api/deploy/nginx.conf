worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format combined '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Upload limit (for image upload endpoints)
    client_max_body_size 20M;

    # Proxy buffering defaults
    proxy_buffer_size          16k;
    proxy_buffers              4 64k;
    proxy_busy_buffers_size    128k;

    # -------------------------------------------------------
    # HTTP → HTTPS redirect (with ACME challenge pass-through)
    # -------------------------------------------------------
    server {
        listen 80;
        server_name cms.nhansinhquan.vn;

        # Let certbot http-01 challenge through
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------
    # HTTPS — main site
    # -------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name cms.nhansinhquan.vn;

        # TLS certificates (managed by certbot / Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/cms.nhansinhquan.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cms.nhansinhquan.vn/privkey.pem;

        # Modern TLS only
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # --- Security headers (Phase 03) ---
        # HSTS 2 years — only enable after confirming HTTPS works end-to-end
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Permissions-Policy: lock down sensitive APIs not used by site
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

        # CSP relaxed — allows GA, Facebook Pixel, Turnstile widget; unsafe-inline
        # accepted for launch. Migrate to nonce-based post-launch.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net https://challenges.cloudflare.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://*.facebook.com https://www.facebook.com https://cms.nhansinhquan.vn https://api.nhansinhquan.vn https://challenges.cloudflare.com;" always;

        # ---- ACME challenge (certbot renewal) ----
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ---- User-uploaded media (served directly by nginx) ----
        location /media/ {
            alias /srv/media/;
            add_header X-Content-Type-Options nosniff;
            add_header Cache-Control "public, immutable";
            expires 30d;
        }

        # ---- Collected static files ----
        location /static/ {
            alias /srv/static/;
            add_header Cache-Control "public, immutable";
            expires 30d;
        }

        # ---- Chat SSE streaming endpoint (regex; declared BEFORE prefix locations) ----
        # Only the streaming endpoint needs buffering OFF / no gzip / long timeouts.
        # Regex `^~` priority means this wins over the `/api/chat/` prefix match below.
        location ~ ^/api/chat/conversations/\d+/messages/stream$ {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;

            proxy_buffering        off;
            proxy_cache            off;
            gzip                   off;
            chunked_transfer_encoding on;

            proxy_connect_timeout  10s;
            proxy_read_timeout     300s;
            proxy_send_timeout     300s;
        }

        # ---- FastAPI (all other requests) ----
        location / {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            # WebSocket support (for future use)
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
