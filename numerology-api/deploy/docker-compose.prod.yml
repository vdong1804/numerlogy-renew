services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file: ./.env.prod
    # Override dev CMD: run migrations then start gunicorn
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app
               -w 4
               -k uvicorn.workers.UvicornWorker
               -b 0.0.0.0:8000
               --timeout 120
               --access-logfile -
               --error-logfile -"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/code/media
      - static_data:/code/static
    restart: unless-stopped
    # No ports exposed — nginx is the only entry point

  db:
    image: postgres:16-alpine
    env_file: ./.env.prod
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "numerology", "-d", "numerology"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # No ports exposed externally

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - media_data:/srv/media:ro
      - static_data:/srv/static:ro
      - ./certbot-webroot:/var/www/certbot:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg_data:
  media_data:
  static_data:
